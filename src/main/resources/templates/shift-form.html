<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shift</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1 th:text="${shiftInputDTO.id} != null ? 'Shift bewerken' : 'Shift toevoegen'"></h1>

<form th:action="${shiftInputDTO.id} != null ? |/shift/${shiftInputDTO.id}/bewerken| : @{/shift/nieuw}"
      th:object="${shiftInputDTO}" method="post">

    <input type="hidden" th:field="*{id}" />

    <p>
        <label>Datum:</label> <input type="date" th:field="*{datum}"/>
        <span th:if="${#fields.hasErrors('datum')}" th:errorclass="error" th:errors="*{datum}"></span>
    </p>
    <p>
        <label>Startuur:</label> <input type="time" th:field="*{startUur}"/>
        <span th:if="${#fields.hasErrors('startUur')}" th:errorclass="error" th:errors="*{startUur}"></span>
    </p>
    <p>
        <label>Einduur:</label> <input type="time" th:field="*{eindUur}"/>
        <span th:if="${#fields.hasErrors('eindUur')}" th:errorclass="error" th:errors="*{eindUur}"></span>
    </p>
    <p>
        <label>Rol:</label>
        <select th:field="*{rol}">
            <option th:each="r : ${shiftRollen}" th:value="${r}" th:text="${r}"></option>
        </select>
        <span th:if="${#fields.hasErrors('rol')}" th:errorclass="error" th:errors="*{rol}"></span>
    </p>
    <p>
        <label>Maximaal aantal barista's:</label> <input type="number" th:field="*{maxBaristas}" min="1"/>
        <span th:if="${#fields.hasErrors('maxBaristas')}" th:errorclass="error" th:errors="*{maxBaristas}"></span>
    </p>
    <p>
        <label>Vestiging:</label>
        <select th:field="*{vestigingId}">
            <option value="">-- kies een vestiging --</option>
            <option th:each="v : ${vestigingen}" th:value="${v.id}"
                    th:text="${v.naam} + ' (' + ${v.stad} + ')'"></option>
        </select>
        <span th:if="${#fields.hasErrors('vestigingId')}" th:errorclass="error" th:errors="*{vestigingId}"></span>
    </p>
    <p><button type="submit">OK</button></p>
</form>
</body>
</html>
