<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${barista.voornaam} + ' ' + ${barista.achternaam}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <script type="text/javascript">
        function goBack() {
            window.history.back();
        }
    </script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1 th:text="${barista.voornaam} + ' ' + ${barista.achternaam}"></h1>

<div class="action-bar">
    <!-- shifts beheren/inschrijven: enkel zichtbaar voor de betreffende barista zelf -->
    <a class="btn" th:if="${isEigenProfiel}" th:href="|/barista/${barista.id}/shifts|">Shifts beheren</a>
    <!-- barista bewerken: enkel zichtbaar voor admins -->
    <a class="btn" sec:authorize="hasRole('ADMIN')" th:href="|/barista/${barista.id}/bewerken|">Barista bewerken</a>
</div>

<!-- persoonlijke gegevens -->
<table>
    <tr>
        <th>Email</th>
        <td th:text="${barista.email}"></td>
    </tr>
    <tr>
        <th>Geboortedatum</th>
        <td th:with="datePattern=#{date.format}"
            th:text="${#temporals.format(barista.geboortedatum, datePattern)}"></td>
    </tr>
    <tr>
        <th>Studentenkaartnummer</th>
        <td th:text="${barista.studentenkaartNummer}"></td>
    </tr>
    <tr>
        <th>Actief</th>
        <td th:text="${barista.actief} ? 'Ja' : 'Nee'"></td>
    </tr>
    <tr>
        <th>Vestiging</th>
        <td th:text="${barista.vestigingNaam}"></td>
    </tr>
</table>

<!-- shifts -->
<h2>Toekomstige shifts</h2>
<table  th:with="datePattern=#{date.format}, timePattern=#{time.format}">
    <tr>
        <th>Datum</th>
        <th>Startuur</th>
        <th>Einduur</th>
    </tr>
    <tr th:each="s : ${barista.toekomstigeShifts}">
        <td th:text="${#temporals.format(s.datum, datePattern)}"></td>
        <td th:text="${#temporals.format(s.startUur, timePattern)}"></td>
        <td th:text="${#temporals.format(s.eindUur, timePattern)}"></td>
    </tr>
</table>

<h2>Afgelopen shifts</h2>
<table>
    <tr>
        <th>Datum</th>
        <th>Startuur</th>
        <th>Einduur</th>
    </tr>
    <tr th:each="s : ${barista.afgelopenShifts}">
        <td th:text="${s.datum}"></td>
        <td th:text="${s.startUur}"></td>
        <td th:text="${s.eindUur}"></td>
    </tr>
</table>

<!-- opleidingen -->
<h2>Geplande opleidingen</h2>
<table>
    <tr>
        <th>Titel</th>
    </tr>
    <tr th:each="o : ${barista.geplandeOpleidingen}">
        <td th:text="${o.titel}"></td>
    </tr>
</table>

<h2>Voltooide opleidingen</h2>
<table>
    <tr>
        <th>Titel</th>
    </tr>
    <tr th:each="o : ${barista.voltooideOpleidingen}">
        <td th:text="${o.titel}"></td>
    </tr>
</table>



<br><br>
<button type="button" onclick="goBack()">Back</button>

</body>
</html>
