<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<link rel="stylesheet" th:href="@{/css/style.css}" />
<body>
<div th:fragment="navbar">

    <nav class="navbar">

        <!-- knoppen/paginas -->
        <div class="nav-left">
            <a th:href="@{/overview}" th:text="#{nav.overview}"></a>
            <a th:href="@{/opleiding}" th:text="#{nav.opleidingen}"></a>
            <a sec:authorize="hasAnyRole('ADMIN','BARISTA')" th:href="@{/barista/mijn-shifts}" th:text="#{nav.mijnshifts}"></a>
            <a sec:authorize="hasAnyRole('ADMIN','BARISTA')" th:href="@{/barista/mijn-profiel}" th:text="#{nav.mijnprofiel}"></a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/barista/nieuw}" th:text="#{nav.baristatoevoegen}"></a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/shift/nieuw}" th:text="#{nav.shifttoevoegen}"></a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/vestiging/nieuw}" th:text="#{nav.vestigingtoevoegen}"></a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/opleiding/nieuw}" th:text="#{nav.opleidingtoevoegen}"></a>
        </div>

        <!-- taal wisselen -->
        <div class="nav-lang">
            <a th:href="@{/overview(lang='nl')}" th:text="#{nav.lang.nl}"></a>
            |
            <a th:href="@{/overview(lang='en')}" th:text="#{nav.lang.en}"></a>
        </div>

        <!-- log in/out -->
        <div class="nav-right">

            <!-- als je ingelogd bent -->
            <span sec:authorize="hasAnyRole('ADMIN','BARISTA')">

                <span>
<!--                    dit zou ook werken door de security context-->
<!--                 <strong sec:authentication="principal.username"></strong>-->
<!--                    dit werkt door GlobalControllerAdvice's @ModelAttribute "username" die de username in de model plaatst-->
                    <strong th:text="${username}"></strong>
                </span>

                <span>
                    |
                   <strong th:each="role : ${roles}"
                           th:text="${role}">
                    </strong>
                </span>

                <form th:action="@{/logout}" method="post" style="display:inline;">
                     <button type="submit" th:text="#{nav.logout}"></button>

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                </form>

            </span>

            <!-- niet ingelogd -->
            <span sec:authorize="!hasAnyRole('ADMIN','BARISTA')">
               <a th:href="@{/login}" th:text="#{nav.login}"></a>
            </span>

        </div>

    </nav>

</div>

</body>
</html>
